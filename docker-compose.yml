services:
  love-diary-go:
    image: ghcr.io/yu-hong-quan/love-diary-go:latest
    container_name: love-diary-go
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      GIN_MODE: release
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-love-diary-go
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 love-diary-go --cleanup
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
